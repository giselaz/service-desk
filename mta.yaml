_schema-version: 3.3.0
ID: service-desk
description: A simple CAP project.
version: 1.0.0
modules:
  - name: service-desk-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: service-desk-auth
      - name: service-desk-db
      - name: service-desk-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: service-desk-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: service-desk-db
    parameters:
      buildpack: nodejs_buildpack
  - name: service-desk-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: service-desk-auth
      - name: srv-api
      - name: service-desk-html5-repo-host
        parameters:
          config:
            HTML5Runtime_enabled: true
          content-target: true
    parameters:
      config:
        destinations:
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
    build-parameters:
      build-result: app/
      requires:
        - artifacts:
            - comticketsservicedesk.zip
          name: comticketsservicedesk
          target-path: app/
  - name: service-desk-destinations
    type: com.sap.application.content
    requires:
      - name: service-desk-auth
        parameters:
          service-key:
            name: service-desk-auth-key
      - name: service-desk-html5-repo-host
        parameters:
          service-key:
            name: service-desk-html5-repo-host-key
      - name: srv-api
      - name: service-desk-destination
        parameters:
          content-target: true
    parameters:
      content:
        instance:
          destinations:
            - Name: service-desk-html5-repository
              ServiceInstanceName: service-desk-html5-repo-host
              ServiceKeyName: service-desk-html5-repo-host-key
              sap.cloud.service: servicedesk.service
            - Authentication: OAuth2UserTokenExchange
              Name: service-desk-auth
              ServiceInstanceName: service-desk-auth
              ServiceKeyName: service-desk-auth-key
              sap.cloud.service: servicedesk.service
          existing_destinations_policy: update
    build-parameters:
      no-source: true
  - name: comticketsservicedesk
    type: html5
    path: app/service-desk
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
        - npm ci
        - npm run build
      supported-platforms:
        []
resources:
  - name: service-desk-auth
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
        role-collections:
          - description: generated
            name: viewer (service-desk ${org}-${space})
            role-template-references:
              - $XSAPPNAME.viewer
          - description: generated
            name: agent (service-desk ${org}-${space})
            role-template-references:
              - $XSAPPNAME.agent
          - description: generated
            name: admin (service-desk ${org}-${space})
            role-template-references:
              - $XSAPPNAME.admin
        tenant-mode: dedicated
        xsappname: service-desk-${org}-${space}
      path: ./xs-security.json
      service: xsuaa
      service-plan: application
  - name: service-desk-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: service-desk-destination
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
              - Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
                Name: srv-api
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
            existing_destinations_policy: update
      service: destination
      service-plan: lite
    requires:
      - name: srv-api
  - name: service-desk-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
